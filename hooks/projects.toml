# Sister hubs that MUST survive every port-scoped kill, fleet-wide.
# 8000  = local-llm-hub FastAPI hub
# 8090  = whisper-server (voice-transcriber)
# 8446  = app-launcher session-host (kill kills every PTY/Claude session)
[global]
never_kill_ports = [8000, 8090, 8446]
slack_notify_channel = "C0B76GBA0LS"   # fleet-wide fallback (used when a category channel below is unset)
slack_notify_user    = "U0B71PQEL6S"   # Slack user id, @mention'd only when slack_notify_mention is on
slack_notify_mention = false           # default off: the channel pushes to mobile without a tag, so the @mention was redundant noise. Flip to true to re-tag every ping.
slack_channel_attention = "C0BAGNEQ163"   # #attention — come-look pings (blocked / awaiting input / ready-to-validate / batch-ready)
slack_channel_log       = "C0BARRUBG03"   # #log — activity record (filed / shipped / merged / weekly digests / system-map image)

# Repos excluded from the architecture map (architecture/ARCHITECTURE.md + the
# generated visual). One maintainable list: vendored/external, legacy, or
# out-of-scope projects. The /system-map generator reads this and skips them.
architecture_ignore = [
  "suna",                    # vendored/external open-source AI-agent platform
  "externalrisk",           # out of scope for the personal-fleet map
  "arboldelossuenos",       # out of scope for the personal-fleet map
  "notion-automation-files", # legacy
]
